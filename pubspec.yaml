name: sistema_clinico
description: >-
  App do sistema clínico do Instituto Inclusivamente
version: 0.0.0-dev.1
repository: https://github.com/3moscas/sistema_clinico
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: ^3.32.0

dependencies:
  animations: any
  chewie: any
  cupertino_icons: any
  dio: any
  flutter:
    sdk: flutter
  flutter_dotenv: any
  flutter_html: any
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: any
  flutter_svg: any
  http: any
  image_picker: any
  intl: any
  json_annotation: any
  loading_indicator: any
  path_provider: any
  photo_view: any
  riverpod_annotation: any
  shared_preferences: any
  timeline_tile: any
  video_player: any

dev_dependencies:
  build_runner: any
  flutter_lints: any
  flutter_test:
    sdk: flutter
  json_serializable: any
  riverpod_generator: any
  riverpod_lint: any

flutter:
  assets:
    - .env
    - assets/images/home/
    - assets/images/shared/
    - assets/images/welcome_image/
  generate: true
  uses-material-design: true